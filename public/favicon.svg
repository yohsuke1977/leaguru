<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="glow" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#ef7f2c" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ef7f2c" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="clip">
      <rect width="64" height="64" rx="16"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="16" fill="#0c1f3d"/>
  <!-- Orange glow -->
  <rect width="64" height="64" rx="16" fill="url(#glow)"/>
  <!-- Baseball ball (scaled from 24x24 viewBox to ~36px centered) -->
  <g clip-path="url(#clip)" transform="translate(14, 14) scale(1.5)">
    <circle cx="12" cy="12" r="9" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M5 8c4 2 10 2 14 0" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M5 16c4-2 10-2 14 0" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
